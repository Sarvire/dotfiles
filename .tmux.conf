# Prefixo
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# Configurações gerais
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g history-limit 10000
set -sg escape-time 0

# Cores
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ====== Tema vermelho/preto ======

# Barra de status
set -g status-position top
set -g status-bg "#0d0808"
set -g status-fg "#e8d0d0"
set -g status-style "bg=#0d0808"

# Esquerda — sessão
set -g status-left-length 30
set -g status-left "#[fg=#0d0808,bg=#cc2222,bold]  #S #[fg=#cc2222,bg=#0d0808]"

# Direita — hora/data
set -g status-right-length 50
set -g status-right "#[fg=#3d1515,bg=#0d0808]#[fg=#e8d0d0,bg=#3d1515]  %H:%M #[fg=#cc2222,bg=#3d1515]#[fg=#0d0808,bg=#cc2222,bold]  %d/%m/%Y "

# Janelas (abas)
setw -g window-status-format "#[fg=#6b3030,bg=#0d0808] #I:#W "
setw -g window-status-current-format "#[fg=#0d0808,bg=#cc2222,bold] #I:#W "
setw -g window-status-separator ""

# Bordas dos painéis
set -g pane-border-style "fg=#3d1515"
set -g pane-active-border-style "fg=#cc2222"

# Mensagens
set -g message-style "bg=#cc2222,fg=#0d0808,bold"

# ====== Atalhos ======

# Dividir painéis
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Navegar entre painéis (vim-like)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Recarregar config
bind r source-file ~/.tmux.conf \; display "Config recarregada!"

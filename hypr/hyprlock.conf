general {
    disable_loading_bar = true
    grace = 0
    hide_cursor = true
    no_fade_in = false
}

background {
    monitor =
    path = ~/Pictures/light.png
    blur_passes = 3
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.4
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Relógio
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(232, 208, 208, 1.0)
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    position = 0, 150
    halign = center
    valign = center
}

# Data
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d de %B")"
    color = rgba(204, 34, 34, 1.0)
    font_size = 22
    font_family = JetBrainsMono Nerd Font
    position = 0, 50
    halign = center
    valign = center
}

# Campo de senha
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(204, 34, 34, 1.0)
    inner_color = rgba(13, 8, 8, 0.9)
    font_color = rgba(232, 208, 208, 1.0)
    fade_on_empty = false
    placeholder_text = <i>Digite a senha...</i>
    hide_input = false
    position = 0, -120
    halign = center
    valign = center
}

# Nome de usuário
label {
    monitor =
    text = $USER
    color = rgba(232, 208, 208, 1.0)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, -60
    halign = center
    valign = center
}
